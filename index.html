<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>FFLogsダメージ内訳計算機</title>
    <style>
        /* --- 全体のレイアウト --- */
        body {
            background-color: #0c0c0d;
            display: flex;
            justify-content: center;
            padding: 40px 20px;
            font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", "Meiryo", sans-serif;
        }

        .damage-analyzer {
            width: 100%;
            max-width: 580px;
            background: linear-gradient(145deg, #1e1e21, #161618);
            border: 1px solid #444;
            border-radius: 12px;
            padding: 30px;
            color: #e0e0e0;
            box-shadow: 0 10px 30px rgba(0,0,0,0.7);
        }

        h3 { 
            color: #f0d060; 
            text-align: center; 
            margin-top: 0; 
            font-size: 1.5em;
            letter-spacing: 1px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
            border-bottom: 1px solid #333;
            padding-bottom: 15px;
        }

        /* --- 用語ガイドエリア --- */
        .guide-section {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid #333;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 20px;
        }

        .guide-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            font-size: 0.85em;
        }

        .guide-item b { color: #f0d060; margin-right: 5px; }

        .warning-text {
            color: #ff6666;
            font-size: 0.85em;
            margin-top: 12px;
            padding-top: 8px;
            border-top: 1px dashed #444;
            font-weight: bold;
        }

        /* --- 入力・ボタン --- */
        textarea {
            width: 100%;
            height: 110px;
            background: #050505;
            color: #00ff66;
            border: 2px solid #3e3e42;
            border-radius: 6px;
            padding: 12px;
            font-family: "Consolas", "Monaco", monospace;
            font-size: 0.9em;
            box-sizing: border-box;
            outline: none;
            transition: border-color 0.2s;
        }
        textarea:focus { border-color: #f0d060; }

        .hp-input-container {
            margin-top: 15px;
            padding: 12px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .hp-input-container label { font-size: 0.9em; color: #aaa; }
        
        .help-icon {
            font-size: 0.85em;
            color: #f0d060;
            cursor: help;
            text-decoration: underline;
            margin-left: 5px;
        }
        .help-icon:hover { color: #fff; }

        input[type="number"]::-webkit-outer-spin-button,
        input[type="number"]::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        input[type="number"] {
            -moz-appearance: textfield;
            background: #000;
            border: 1px solid #555;
            color: #fff;
            padding: 8px 12px;
            border-radius: 4px;
            width: 120px;
            text-align: right;
            font-family: 'Consolas', monospace;
            outline: none;
        }
        input[type="number"]:focus { border-color: #f0d060; }

        .calc-btn {
            width: 100%;
            padding: 15px;
            margin-top: 15px;
            background: linear-gradient(to bottom, #8a2a2a, #601a1a);
            color: #fff;
            border: 1px solid #333;
            border-radius: 6px;
            font-weight: bold;
            font-size: 1.1em;
            cursor: pointer;
        }
        .calc-btn:hover { background: linear-gradient(to bottom, #a03030, #7a2020); }

        /* --- 解析結果エリア --- */
        .analysis-card { background: #111; padding: 20px; border-radius: 6px; margin-top: 20px; border: 1px solid #333; }
        .damage-bar-container { height: 32px; width: 100%; background: #222; display: flex; margin: 15px 0; border-radius: 4px; overflow: hidden; border: 1px solid #444; }
        
        .bar-mitigated { background: #28a745; } 
        .bar-special   { background: #82ccdd; }
        .bar-absorbed  { background: #ffd700; }
        .bar-taken     { background: #dc3545; }
        .bar-overkill  { background: #ff00ff; }

        .legend { font-size: 0.75em; display: flex; justify-content: space-between; flex-wrap: wrap; gap: 8px; margin-bottom: 20px; }
        .legend-item { display: flex; align-items: center; }
        .legend-item span { width: 10px; height: 10px; border-radius: 2px; margin-right: 5px; }

        .stats-table { width: 100%; border-collapse: collapse; font-size: 0.95em; }
        .stats-table td { padding: 10px 0; border-bottom: 1px solid #222; }
        .val { text-align: right; font-family: 'Consolas', monospace; font-weight: bold; }
        .final-dmg { color: #ff6666 !important; font-size: 1.15em; }
        
        .report-box { padding: 15px; border-radius: 6px; margin-top: 15px; font-size: 0.95em; line-height: 1.6; border-left: 5px solid #555; background: rgba(255, 255, 255, 0.03); }
        .death-report { border-left-color: #ff00ff; background: rgba(255, 0, 255, 0.08); }
        .survival-report { border-left-color: #28a745; background: rgba(40, 167, 69, 0.08); }
        .advice-tag { color: #ffec3d; font-weight: bold; }
        .error-msg { background: #4a1a1a; border: 1px solid #ff4d4d; color: #ffcccc; padding: 15px; margin-top: 20px; border-radius: 6px; font-size: 0.9em; }
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="damage-analyzer">
    <h3>FFLogsダメージ内訳計算機</h3>
    
    <div class="guide-section">
        <div class="guide-grid">
            <div class="guide-item"><b>U:</b> 軽減計算前ダメージ</div>
            <div class="guide-item"><b>M:</b> 軽減された量</div>
            <div class="guide-item"><b>A:</b> バリア相殺量</div>
            <div class="guide-item"><b>O:</b> HP超過分</div>
            <div class="guide-item"><b>B/P:</b> ブロック(20%)/受け流し(15%)</div>
            <div class="guide-item"><b>%:</b> 軽減率</div>
        </div>
        <div class="warning-text">⚠️ <b>ご注意:</b> "prepares" を含む行はダメージ確定ログです。prepares記載のない行を貼り付けてください。</div>
    </div>

    <textarea id="logInput"></textarea>
    
    <div class="hp-input-container">
        <label for="maxHpInput">
            ♥️任意：最大HP入力で解析内容拡充
            <span class="help-icon" title="FFLogsの『リソース』タブ ＞ 『ヒットポイント』を選択し、対象プレイヤーを絞り込んでグラフにマウスを合わせると、正確な最大HPを確認できます。">（❓調べ方）</span>
        </label>
        <input type="number" id="maxHpInput" placeholder="例: 32831" onkeydown="if(event.key==='ArrowUp'||event.key==='ArrowDown')event.preventDefault()" onwheel="event.preventDefault()">
    </div>

    <button onclick="analyzeLog()" class="calc-btn">ログを解析する</button>

    <div id="errorArea" class="hidden"></div>

    <div id="resultArea" class="hidden">
        <div class="analysis-card">
            <span id="skillName" style="color:#f0d060; font-weight:bold; font-size:1.1em;">解析結果</span>
            <div class="damage-bar-container" id="bar"></div>
            <div class="legend">
                <div class="legend-item"><span class="bar-mitigated"></span>軽減 (M-B/P)</div>
                <div class="legend-item"><span class="bar-special"></span>特殊 (B/P)</div>
                <div class="legend-item"><span class="bar-absorbed"></span>バリア (A)</div>
                <div class="legend-item"><span class="bar-taken"></span>実ダメ</div>
                <div class="legend-item"><span class="bar-overkill"></span>超過 (O)</div>
            </div>

            <table class="stats-table">
                <tr><td>未軽減ダメージ (U)</td><td class="val" id="val-u">-</td></tr>
                <tr><td>合計軽減量 (M)</td><td class="val" id="val-m" style="color:#45cc66;">-</td></tr>
                <tr id="row-special" class="hidden"><td>└ 内訳 (ブロック/受け流し)</td><td class="val" id="val-special" style="color:#82ccdd;">-</td></tr>
                <tr><td>バリア相殺量 (A)</td><td class="val" id="val-a" style="color:#ffd700;">-</td></tr>
                <tr><td><strong>最終実ダメージ</strong></td><td class="val final-dmg" id="val-d">-</td></tr>
            </table>

            <div id="reportArea" class="report-box"></div>
        </div>
    </div>
</div>

<script>
window.onload = function() {
    const textarea = document.getElementById('logInput');
    textarea.placeholder = "ここにLogsの被ダメージログを貼り付けてください。\n例: 00:42.575 リキッドハンド ハンド・オブ・ペイン Sabamiso Umao 32831 (A: 16805) (U: 83240, M: 28795)";
};

function analyzeLog() {
    const input = document.getElementById('logInput').value.trim();
    const maxHp = parseInt(document.getElementById('maxHpInput').value) || 0;
    const resultArea = document.getElementById('resultArea');
    const errorArea = document.getElementById('errorArea');
    
    resultArea.classList.add('hidden');
    errorArea.classList.add('hidden');
    if (!input) return;

    if (input.includes('prepares')) {
        errorArea.innerHTML = `<div class="error-msg"><strong>⚠️ エラー:</strong> ダメージ確定ログです。prepares記載のない行を貼ってください。</div>`;
        errorArea.classList.remove('hidden');
        return;
    }

    const uMatch = input.match(/U:\s*(\d+)/);
    const mMatch = input.match(/M:\s*(\d+)/);
    const aMatch = input.match(/A:\s*(\d+)/);
    const oMatch = input.match(/O:\s*(\d+)/);
    const bMatch = input.match(/B:\s*(\d+)/);
    const pMatch = input.match(/P:\s*(\d+)/);
    
    const u = uMatch ? parseInt(uMatch[1]) : 0;
    const m = mMatch ? parseInt(mMatch[1]) : 0;
    const a = aMatch ? parseInt(aMatch[1]) : 0;
    const o = oMatch ? parseInt(oMatch[1]) : 0;
    const b = bMatch ? parseInt(bMatch[1]) : 0;
    const p = pMatch ? parseInt(pMatch[1]) : 0;
    const specialMit = b + p;
    const pureMit = m - specialMit;

    if (!uMatch && a > 0) {
        resultArea.classList.remove('hidden');
        const parts = input.split(/\s+/);
        let detectedSkill = "解析結果";
        if (parts.length > 2) {
            detectedSkill = isNaN(parts[2]) ? parts[2] : (parts[3] || "解析結果");
        }
        document.getElementById('skillName').innerText = detectedSkill;
        document.getElementById('bar').innerHTML = `<div class="bar-absorbed" style="width:100%"></div>`;
        document.getElementById('val-u').innerText = "計測不能";
        document.getElementById('val-m').innerText = "-";
        document.getElementById('val-a').innerText = `-${a.toLocaleString()}`;
        document.getElementById('val-d').innerText = "0";
        document.getElementById('reportArea').className = "report-box survival-report";
        document.getElementById('reportArea').innerHTML = `<strong>✅ バリア完封</strong><br>バリアが完全にダメージを飲み込みました！<br><span class="advice-tag">相殺量: ${a.toLocaleString()}</span>`;
        return;
    }

    if (!uMatch) {
        errorArea.innerHTML = `<div class="error-msg"><strong>⚠️ 形式エラー:</strong> 未軽減ダメージ(U:)が見つかりません。</div>`;
        errorArea.classList.remove('hidden');
        return;
    }

    const dmgMatch = input.match(/\s(\d+)\s+\(A:/) || input.match(/\s(\d+)\s+\(B:/) || input.match(/Player\s+\(\d+\)\s+(\d+)/) || input.match(/(\d+)\s+\(O:/) || input.match(/(\d+)\s+\(U:/);
    const d = dmgMatch ? parseInt(dmgMatch[1]) : 0;

    resultArea.classList.remove('hidden');
    const parts = input.split(/\s+/);
    let detectedSkill = "解析結果";
    if (parts.length > 2) {
        detectedSkill = isNaN(parts[2]) ? parts[2] : (parts[3] || "解析結果");
    }
    document.getElementById('skillName').innerText = detectedSkill;

    const mPct = (m / u) * 100;
    const aPct = (a / u) * 100;
    const oPct = (o / u) * 100;
    const specialPct = (specialMit / u) * 100;
    const pureMitPct = mPct - specialPct;

    // 2. 基本となる実ダメの割合
    const takenBasePct = 100 - mPct - aPct - oPct;

    // 3. バーの描画
    // 最後の要素に flex-grow: 1 を付与することで、0.00001% の隙間も埋め尽くします
    document.getElementById('bar').innerHTML = `
        <div class="bar-mitigated" style="width:${pureMitPct}%"></div>
        <div class="bar-special" style="width:${specialPct}%"></div>
        <div class="bar-absorbed" style="width:${aPct}%"></div>
        <div class="bar-taken" style="width:${takenBasePct}%; ${o <= 0 ? 'flex-grow:1;' : ''}"></div>
        ${o > 0 ? `<div class="bar-overkill" style="width:${oPct}%; flex-grow:1;"></div>` : ''}
    `;

    document.getElementById('val-u').innerText = u.toLocaleString();
    document.getElementById('val-m').innerText = m > 0 ? `-${m.toLocaleString()} (${((m/u)*100).toFixed(1)}%)` : "なし (0%)";
    document.getElementById('val-a').innerText = `-${a.toLocaleString()}`;
    document.getElementById('val-d').innerText = d.toLocaleString();

    if (specialMit > 0) {
        document.getElementById('row-special').classList.remove('hidden');
        document.getElementById('val-special').innerText = `-${specialMit.toLocaleString()}`;
    } else {
        document.getElementById('row-special').classList.add('hidden');
    }

    const reportArea = document.getElementById('reportArea');
    if (o > 0) {
        reportArea.className = "report-box death-report";
        const currentTaken = u - m;
        const requiredRatio = (o / currentTaken) * 100;
        let hpAdvice = "";
        
        if (maxHp > 0) {
            const displayHpPct = Math.floor((d / maxHp) * 1000) / 10;
            hpAdvice = `<br><br><strong>💔 最大HP判定:</strong><br>`;
            advicePctStr = (d >= maxHp) ? "100.0" : displayHpPct.toFixed(1);
            hpAdvice += `被弾時のHP割合: <span class="advice-tag">${advicePctStr}%</span><br>`;
            
            if (currentTaken > maxHp) {
                if (d >= maxHp) {
                    hpAdvice += `👉 <span style="color:#00ff66;">HPは100%万全でした。戻しは完璧でしたが軽減量が不足しており、全快でも耐えられないダメージでした。軽減プランを再構築するか、装備・飯による最大HPの底上げを検討しましょう。</span>`;
                } else if (displayHpPct >= 91) {
                    hpAdvice += `👉 <span style="color:#f0d060;">HPはほぼ戻っていましたが、この威力だと全快でも耐えられない軽減不足の状態です。軽減を増やすことを最優先しつつ、戻しも100%を目指しましょう。</span>`;
                } else if (displayHpPct >= 71) {
                    hpAdvice += `👉 <span style="color:#f0d060;">全快でも耐えられないほど軽減が足りておらず、HPも少し凹んでいました。軽減の相談と、ヒール漏れがないかの再確認をセットで行いましょう。</span>`;
                } else {
                    hpAdvice += `👉 <span style="color:#ff6666;">軽減が大幅に不足しており、全快でも耐えられない非常に危険な状態です。まずは軽減を厚く積み増し、着弾前のHPも全快まで戻すよう意識してみましょう。</span>`;
                }
            } else {
                if (d >= maxHp) {
                    hpAdvice += `👉 <span style="color:#00ff66;">HPは100%フルでした。戻しは完璧です！乱数対策にバリアを厚くするか、保険の軽減をあと1枚足すとより安全になります。</span>`;
                } else if (displayHpPct >= 91) {
                    hpAdvice += `👉 <span style="color:#f0d060;">HPはほぼ戻っていましたが、わずかに足りなかったようです。軽減・バリアがあと1枚あるか、HPが100%なら生存できていた可能性があります。</span>`;
                } else if (displayHpPct >= 71) {
                    hpAdvice += `👉 <span style="color:#f0d060;">惜しいです！本来は耐えられる威力ですが、HPが少し凹んでいました。立ち位置によるヒール漏れや、自衛スキルの活用を再確認してみましょう。</span>`;
                } else {
                    hpAdvice += `👉 <span style="color:#ff6666;">軽減は十分効いています。着弾前にHPを戻しきる（またはヒール漏れをなくす）ことで、余裕を持って生存できる可能性が高いです。</span>`;
                }
            }
        }

        const getStacks = (pct) => {
            let s = 0, mul = 1.0;
            while ((1 - mul) * 100 < requiredRatio && s < 10) { s++; mul *= (1 - pct/100); }
            return s;
        };

        reportArea.innerHTML = `
            <strong>🚨 死亡リポート</strong><br>
            HPを <span class="advice-tag">${o.toLocaleString()}</span> 超過しました。${m === 0 ? '<br><span style="color:#ffcc00;">※軽減が1枚も入っていません！</span>' : ''}<br>
            あと <span class="advice-tag">${requiredRatio.toFixed(1)}%</span> のカットが必要です。${hpAdvice}<br><br>
            <strong>🛡️ 軽減追加の目安 (乗算計算済み):</strong><br>
            ・<span class="advice-tag">10%軽減</span> なら あと <b style="font-size:1.2em;">${getStacks(10)}枚</b><br>
            ・<span class="advice-tag">20%軽減</span> なら あと <b style="font-size:1.2em;">${getStacks(20)}枚</b><br>
            ・<span class="advice-tag">30%軽減</span> なら あと <b style="font-size:1.2em;">${getStacks(30)}枚</b><br>
            ・<span class="advice-tag">40%軽減</span> なら あと <b style="font-size:1.2em;">${getStacks(40)}枚</b>
        `;
    } else {
        reportArea.className = "report-box survival-report";
        let msg = `<strong>✅ 生存成功</strong><br>`;
        if (m === 0 && a === 0) msg += `軽減・バリアなしの「素受け」で耐えきりました！`;
        else if (a >= (u - m)) msg += `バリアがダメージを完全に上回る状態でした。`;
        else msg += `無事に受けきりました！`;
        reportArea.innerHTML = msg;
    }
}
</script>
</body>
</html>
